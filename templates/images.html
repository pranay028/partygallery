{% extends 'base.html' %}
{% block content %}
    <h2 class="text-2xl font-bold mb-6">All Memories</h2>
    
    <div class="grid grid-cols-2 gap-3">
    {% for img in images %}
        <div class="aspect-square rounded-2xl overflow-hidden bg-white/5 cursor-pointer hover:opacity-80 transition" 
             onclick="openImageModal('{{ img.original }}')">
             
            <img src="{{ img.thumbnail }}" 
     class="w-full h-full object-cover pointer-events-none" 
     loading="lazy"
     onerror="this.onerror=null; this.src='{{ img.original }}';">
            
        </div>
    {% else %}
        <div class="col-span-2 text-center py-10 opacity-50">
            <p>No photos uploaded yet.</p>
        </div>
    {% endfor %}
    </div>
{% endblock %}
