{% extends 'base.html' %}
{% block content %}
    <h2 class="text-2xl font-bold mb-6">All Memories</h2>
    
    <div id="gallery" class="grid grid-cols-2 md:grid-cols-3 gap-3">
        {% for image_url in images %}
            <div class="aspect-square rounded-2xl overflow-hidden bg-white/5 border border-white/5 shadow-lg">
                <img src="{{ image_url }}" class="w-full h-full object-cover">
            </div>
        {% else %}
            <div class="col-span-full text-center py-12 text-gray-400">
                <p>No images found yet.</p>
            </div>
        {% endfor %}
    </div>
{% endblock %}
