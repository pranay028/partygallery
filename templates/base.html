<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Party App</title>
</head>
<body class="bg-gradient-to-br from-gray-900 to-indigo-950 min-h-screen text-white">
    
    <nav class="p-4 border-b border-white/10">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <a href="/"><h1 class="text-xl font-bold tracking-tight">PartyCam</h1></a>
            <div class="flex space-x-6 text-sm opacity-80">
                <a href="/">Home</a>
                <a href="/images">Images</a>
                <a href="/videos">Videos</a>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4">
        {% block content %}
        {% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="space-y-2 mb-6">
      {% for message in messages %}
        <div class="bg-indigo-600/20 border border-indigo-500/50 text-indigo-100 p-4 rounded-2xl text-center shadow-lg backdrop-blur-md">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
{% endblock %}
    </main>

    <div id="mediaModal" class="fixed inset-0 bg-black/95 hidden z-50 flex flex-col items-center justify-center p-4" onclick="closeOnBackground(event)">
        
        <button onclick="closeModal()" class="absolute top-4 right-4 w-10 h-10 bg-white/10 rounded-full flex items-center justify-center text-white hover:bg-white/20 z-50">
            <svg class="w-6 h-6 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        
        <div id="modalContent" class="w-full max-w-3xl max-h-[70vh] flex items-center justify-center pointer-events-none">
            </div>

    </div>

    <script>
        function openImageModal(imgUrl) {
            const content = document.getElementById('modalContent');
            // Adding pointer-events-auto to the image so it catches clicks
            content.innerHTML = `<img src="${imgUrl}" class="max-w-full max-h-[70vh] object-contain rounded-lg shadow-2xl pointer-events-auto">`;
            document.getElementById('mediaModal').classList.remove('hidden');
        }

        function openVideoModal(videoUrl) {
            const content = document.getElementById('modalContent');
            // Adding pointer-events-auto to the video so controls work
            content.innerHTML = `
                <video controls autoplay class="max-w-full max-h-[70vh] w-full rounded-lg shadow-2xl pointer-events-auto">
                    <source src="${videoUrl}" type="video/mp4">
                </video>`;
            document.getElementById('mediaModal').classList.remove('hidden');
        }

        function closeModal() {
            const modal = document.getElementById('mediaModal');
            modal.classList.add('hidden');
            document.getElementById('modalContent').innerHTML = '';
        }

        // NEW: Detect if the click was OUTSIDE the image/video
        function closeOnBackground(event) {
            // If the element they clicked was an IMG or VIDEO, do nothing (don't close)
            if (event.target.tagName === 'IMG' || event.target.tagName === 'VIDEO') {
                return;
            }
            // Otherwise, they clicked the background, so close it
            closeModal();
        }
        
    </script>
</body>
</html>
